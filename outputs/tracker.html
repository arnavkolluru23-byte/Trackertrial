<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Pulse | Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Libre+Franklin:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="tracker">
  <header class="site-header">
    <div class="site-shell nav-shell">
      <a href="./index.html" class="brand">
        <span class="brand-mark"></span>
        <span class="brand-text">Campus Pulse</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="./index.html" class="site-link" data-page="home">Home</a>
        <a href="./tracker.html" class="site-link" data-page="tracker">Tracker</a>
        <a href="./courses.html" class="site-link" data-page="courses">Courses</a>
        <a href="./calendar.html" class="site-link" data-page="calendar">Calendar</a>
        <a href="./resources.html" class="site-link" data-page="resources">Resources</a>
        <div class="site-menu">
          <button class="site-link site-link-button" type="button">More</button>
          <div class="site-dropdown">
            <a href="./tracker.html#dailyTracker">Daily log</a>
            <a href="./calendar.html#savedHistory">Saved history</a>
            <a href="./courses.html#healthPath">Health path</a>
            <a href="./resources.html#videos">Video library</a>
          </div>
        </div>
      </nav>
    </div>
  </header>

  <main class="site-shell">
    <section class="page-banner">
      <div class="page-banner-image feature-image-tracker"></div>
      <div class="page-banner-copy">
        <p class="eyebrow">Daily tracker</p>
        <h1 id="dailyTracker">Record your day</h1>
      </div>
    </section>

    <div class="page-layout">
      <section class="panel tracker-panel">
        <div class="panel-head">
          <div>
            <p class="panel-kicker">Today</p>
            <h2 id="todayHeading">Daily record</h2>
          </div>
          <div class="status-wrap">
            <span class="status-chip" id="recordStatus">Fresh day</span>
            <span class="date-chip" id="currentDateChip"></span>
          </div>
        </div>

        <form id="trackerForm">
          <div class="grid two-col">
            <label>
              <span>Sleep hours</span>
              <input type="number" step="0.5" min="0" max="24" name="sleepHours" placeholder="7.5">
            </label>
            <label>
              <span>Energy</span>
              <select name="energy">
                <option value="">Select</option>
                <option>Low</option>
                <option>Okay</option>
                <option>Good</option>
                <option>High</option>
              </select>
            </label>
            <label>
              <span>Mood</span>
              <select name="mood">
                <option value="">Select</option>
                <option>Stressed</option>
                <option>Steady</option>
                <option>Motivated</option>
                <option>Great</option>
              </select>
            </label>
            <label>
              <span>Water (cups)</span>
              <input type="number" min="0" max="30" name="water" placeholder="8">
            </label>
          </div>

          <div class="grid two-col">
            <label>
              <span>Main class attended today</span>
              <input type="text" name="mainClass" placeholder="BIO, CHEM, INFO 200, etc.">
            </label>
            <label>
              <span>Informatics focus today</span>
              <select name="infoFocus">
                <option value="">Choose a focus</option>
                <option>INFO 200 foundations</option>
                <option>INFO 201 data science basics</option>
                <option>Ethics / policy / equity</option>
                <option>Health informatics</option>
                <option>Database practice</option>
                <option>Visualization practice</option>
                <option>Study planning</option>
              </select>
            </label>
          </div>

          <label>
            <span>Study tasks completed</span>
            <textarea name="studyTasks" rows="3" placeholder="Lecture notes, homework, office hours, quiz prep, textbook reading..."></textarea>
          </label>

          <div class="grid three-col checks">
            <label class="check-card"><input type="checkbox" name="habits" value="Went to class"><span>Went to class</span></label>
            <label class="check-card"><input type="checkbox" name="habits" value="Did informatics study"><span>Did informatics study</span></label>
            <label class="check-card"><input type="checkbox" name="habits" value="Workout or walk"><span>Workout or walk</span></label>
            <label class="check-card"><input type="checkbox" name="habits" value="Meal on time"><span>Meal on time</span></label>
            <label class="check-card"><input type="checkbox" name="habits" value="Reviewed notes"><span>Reviewed notes</span></label>
            <label class="check-card"><input type="checkbox" name="habits" value="Protected sleep"><span>Protected sleep</span></label>
          </div>

          <div class="grid two-col">
            <label>
              <span>Recommended next UW course</span>
              <select name="nextCourse">
                <option value="">Choose one</option>
                <option>INFO 200 - Intellectual Foundations of Informatics</option>
                <option>INFO 201 - Foundational Skills for Data Science</option>
                <option>INFO 104 - Technology Ethics, Policy, and Law</option>
                <option>SPH 481 - Ethics, Social Justice and Policy in Public Health</option>
                <option>INFO 468 - Designing for Personal Health and Wellness</option>
                <option>INFO 478 - Population Health Informatics</option>
                <option>BIME 300 - Transformational Technologies for Biology, Medicine, and Health</option>
                <option>BIME 435 - Informatics in Healthcare</option>
                <option>INFO 430 - Database Design and Management</option>
                <option>INFO 474 - Interactive Information Visualization</option>
              </select>
            </label>
            <label>
              <span>Study minutes</span>
              <input type="number" min="0" name="studyMinutes" placeholder="90">
            </label>
          </div>

          <label>
            <span>Reflection</span>
            <textarea name="reflection" rows="4" placeholder="What worked today? What should tomorrow feel like?"></textarea>
          </label>

          <div class="button-row bottom-buttons">
            <button type="submit" class="btn btn-save">Save today's record</button>
            <button type="button" class="btn btn-clear" id="clearDayBtn">Clear today's record</button>
          </div>
        </form>
      </section>

      <aside class="panel sidebar-panel">
        <p class="panel-kicker">Quick links</p>
        <h2>Move fast</h2>
        <div class="link-stack">
          <a class="mini-link-card" href="./calendar.html">Open calendar history</a>
          <a class="mini-link-card" href="./courses.html">See next course options</a>
          <a class="mini-link-card" href="./resources.html">Browse books and videos</a>
        </div>
      </aside>
    </div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
